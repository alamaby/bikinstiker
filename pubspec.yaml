name: bikin_stiker
description: "BikinStiker - AI-powered WhatsApp sticker generator."
publish_to: 'none'
version: 0.2.2+6

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.0

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # DI & utilities
  get_it: ^7.7.0
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2

  # Sharing
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.15.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
